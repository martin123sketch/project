<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>raylibcompiler - IDE v1.0 (Web/Android Port)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Configuración Adaptativa
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Variables del Estado (Traducidas de C++)
    let lineasCodigo = ["#include <iostream>", "int main() {", "    return 0;", "}"];
    let lineaActual = 0;
    let columnaActual = 0;
    let scrollY = 0;
    const altoLinea = 25;
    const tamanioFuente = 20;

    let temporizadorCursor = 0;
    let mostrarCursor = true;
    let menuAbierto = false;

    let archivoAbiertoActual = "Sin_Nombre.cpp";
    let modoBuscadorLinea = false;
    let inputLineaBuscada = "";
    let editandoNombreAbajo = false;
    let mensajeErrorAndroid = "";

    // Botones (Coordenadas relativas o ajustables)
    const botonMenu = { x: 20, y: 20, w: 30, h: 30 };

    // Bucle Principal (Simulación de Raylib a 60 FPS)
    function UpdateAndDraw() {
        // --- LÓGICA DEL CURSOR ---
        temporizadorCursor += 1/60;
        if (temporizadorCursor >= 0.5) {
            mostrarCursor = !mostrarCursor;
            temporizadorCursor = 0;
        }

        // --- DIBUJADO (Limpia pantalla) ---
        ctx.fillStyle = "#1e1e1e"; // Fondo oscuro clásico de IDE
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- DIBUJAR LÍNEAS DE CÓDIGO (Syntax Highlight aproximado) ---
        ctx.font = `${tamanioFuente}px monospace`;
        
        for (let l = 0; l < lineasCodigo.length; l++) {
            let dibujoY = 80 + (l * altoLinea) - scrollY;

            // Renderizado óptico (Culling)
            if (dibujoY < 45 || dibujoY > canvas.height - 100) continue;

            // Dibujar número de línea
            ctx.fillStyle = "#858585";
            ctx.fillText((l + 1).toString(), 20, dibujoY);

            // Dibujar línea separadora
            ctx.fillStyle = "#3c3c3c";
            ctx.fillRect(55, dibujoY - 18, 2, altoLinea);

            // Resaltar línea activa
            if (l === lineaActual) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
                ctx.fillRect(65, dibujoY - 18, canvas.width - 80, altoLinea);
            }

            // Procesar y resaltar palabras clave de la línea
            let linea = lineasCodigo[l];
            let acumuladoX = 70;
            let palabras = linea.split(/(\s+)/); // Separa manteniendo espacios

            palabras.forEach(palabra => {
                if (palabra.trim().startsWith("#include") || palabra.trim().startsWith("#")) {
                    ctx.fillStyle = "#9632fa"; // Violeta especial
                } else if (["int", "while", "if", "return", "void", "using", "namespace"].includes(palabra.trim())) {
                    ctx.fillStyle = "#3296fa"; // Azul palabra clave
                } else {
                    ctx.fillStyle = "#ffffff"; // Blanco común
                }

                ctx.fillText(palabra, acumuladoX, dibujoY);
                acumuladoX += ctx.measureText(palabra).width;
            });

            // Dibujar el cursor de edición
            if (l === lineaActual && mostrarCursor && !modoBuscadorLinea && !editandoNombreAbajo) {
                let textoHastaCursor = linea.substring(0, columnaActual);
                let xCursor = 70 + ctx.measureText(textoHastaCursor).width;
                ctx.fillStyle = "#b446ff";
                ctx.fillRect(xCursor, dibujoY - 18, 2, tamanioFuente);
            }
        }

        // --- BARRA DE ESTADO INFERIOR ---
        ctx.fillStyle = "#007acc"; // Azul tipo VS Code
        ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
        ctx.fillStyle = "#ffffff";
        ctx.font = "14px sans-serif";
        ctx.fillText(`Archivo: ${archivoAbiertoActual}  |  Línea: ${lineaActual + 1}, Col: ${columnaActual}`, 20, canvas.height - 15);

        if (mensajeErrorAndroid) {
            ctx.fillStyle = "#ff3333";
            ctx.fillText(mensajeErrorAndroid, 400, canvas.height - 15);
        }

        // --- INTERFAZ DE DIÁLOGOS DE ENTRADA ---
        if (modoBuscadorLinea) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = "20px sans-serif";
            ctx.fillText("Ir a la línea: " + inputLineaBuscada + "_", canvas.width/2 - 100, canvas.height/2);
        }

        requestAnimationFrame(UpdateAndDraw);
    }

    // --- CAPTURA DE TECLADO (Reemplaza los GetCharPressed / IsKeyPressed de Raylib) ---
    window.addEventListener('keydown', (e) => {
        if (modoBuscadorLinea) {
            if (e.key === 'Enter') {
                let destino = parseInt(inputLineaBuscada) - 1;
                if (!isNaN(destino)) {
                    lineaActual = Math.max(0, Math.min(destino, lineasCodigo.length - 1));
                    columnaActual = 0;
                }
                modoBuscadorLinea = false;
            } else if (e.key === 'Backspace') {
                inputLineaBuscada = inputLineaBuscada.slice(0, -1);
            } else if (/^\d$/.test(e.key)) {
                inputLineaBuscada += e.key;
            } else if (e.key === 'Escape') {
                modoBuscadorLinea = false;
            }
            return;
        }

        // Comandos de movimiento y escritura comunes
        let linea = lineasCodigo[lineaActual];

        if (e.key === 'ArrowUp') {
            if (lineaActual > 0) {
                lineaActual--;
                columnaActual = Math.min(columnaActual, lineasCodigo[lineaActual].length);
            }
        } else if (e.key === 'ArrowDown') {
            if (lineaActual < lineasCodigo.length - 1) {
                lineaActual++;
                columnaActual = Math.min(columnaActual, lineasCodigo[lineaActual].length);
            }
        } else if (e.key === 'ArrowLeft') {
            if (columnaActual > 0) columnaActual--;
        } else if (e.key === 'ArrowRight') {
            if (columnaActual < linea.length) columnaActual++;
        } else if (e.key === 'Backspace') {
            if (columnaActual > 0) {
                lineasCodigo[lineaActual] = linea.slice(0, columnaActual - 1) + linea.slice(columnaActual);
                columnaActual--;
            } else if (lineaActual > 0) {
                // Borrar al inicio une las líneas
                columnaActual = lineasCodigo[lineaActual - 1].length;
                lineasCodigo[lineaActual - 1] += linea;
                lineasCodigo.splice(lineaActual, 1);
                lineaActual--;
            }
        } else if (e.key === 'Enter') {
            let resto = linea.slice(columnaActual);
            lineasCodigo[lineaActual] = linea.slice(0, columnaActual);
            lineasCodigo.splice(lineaActual + 1, 0, resto);
            lineaActual++;
            columnaActual = 0;
        } else if (e.key === 'l' && e.ctrlKey) { 
            // Ctrl + L activa el buscador de líneas
            e.preventDefault();
            modoBuscadorLinea = true;
            inputLineaBuscada = "";
        } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
            // Escribir texto estándar
            lineasCodigo[lineaActual] = linea.slice(0, columnaActual) + e.key + linea.slice(columnaActual);
            columnaActual++;
        }
    });

    // Iniciar bucle
    requestAnimationFrame(UpdateAndDraw);
</script>

</body>
</html>
