<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>raylibcompiler - IDE v1.0 (Mobile Port)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<input type="file" id="fileInput" accept=".cpp,.txt" style="display: none;">

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Variables de estado
    let lineasCodigo = ["#include <iostream>", "int main() {", "    std::cout << \"¡Hola Android!\" << std::endl;", "    return 0;", "}"];
    let lineaActual = 0;
    let columnaActual = 0;
    let scrollY = 0;
    const altoLinea = 25;
    const tamanioFuente = 18;

    let temporizadorCursor = 0;
    let mostrarCursor = true;

    let archivoAbiertoActual = "Sin_Nombre.cpp";
    let modoBuscadorLinea = false;
    let inputLineaBuscada = "";
    
    let modoRenombrar = false;
    let nuevoNombreTemp = "";

    // --- TEXTAREA OCULTO PARA EL TECLADO EN CELULARES ---
    const tecladoOculto = document.createElement('textarea');
    tecladoOculto.style.position = 'absolute';
    tecladoOculto.style.left = '0px';
    tecladoOculto.style.top = '0px';
    tecladoOculto.style.width = '1px';
    tecladoOculto.style.height = '1px';
    tecladoOculto.style.opacity = '0.01';
    tecladoOculto.style.border = 'none';
    tecladoOculto.style.outline = 'none';
    tecladoOculto.value = "";
    document.body.appendChild(tecladoOculto);

    tecladoOculto.addEventListener('focus', () => window.scrollTo(0, 0));

    // Bucle de renderizado
    function UpdateAndDraw() {
        temporizadorCursor += 1/60;
        if (temporizadorCursor >= 0.5) {
            mostrarCursor = !mostrarCursor;
            temporizadorCursor = 0;
        }

        // Fondo oscuro
        ctx.fillStyle = "#1e1e1e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar líneas de código
        ctx.font = `${tamanioFuente}px monospace`;
        for (let l = 0; l < lineasCodigo.length; l++) {
            let dibujoY = 120 + (l * altoLinea) - scrollY; // Bajamos el código para dar espacio a la botonera

            if (dibujoY < 100 || dibujoY > canvas.height - 50) continue;

            // Números de línea
            ctx.fillStyle = "#858585";
            ctx.fillText((l + 1).toString(), 20, dibujoY);

            // Separador
            ctx.fillStyle = "#3c3c3c";
            ctx.fillRect(55, dibujoY - 16, 2, altoLinea);

            if (l === lineaActual) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
                ctx.fillRect(65, dibujoY - 16, canvas.width - 80, altoLinea);
            }

            let linea = lineasCodigo[l];
            let acumuladoX = 70;
            let palabras = linea.split(/(\s+)/);

            palabras.forEach(palabra => {
                if (palabra.trim().startsWith("#include") || palabra.trim().startsWith("#")) {
                    ctx.fillStyle = "#9632fa";
                } else if (["int", "while", "if", "return", "void", "using", "namespace", "std", "cout", "endl"].includes(palabra.trim())) {
                    ctx.fillStyle = "#3296fa";
                } else {
                    ctx.fillStyle = "#ffffff";
                }
                ctx.fillText(palabra, acumuladoX, dibujoY);
                acumuladoX += ctx.measureText(palabra).width;
            });

            if (l === lineaActual && mostrarCursor && !modoBuscadorLinea && !modoRenombrar) {
                let textoHastaCursor = linea.substring(0, columnaActual);
                let xCursor = 70 + ctx.measureText(textoHastaCursor).width;
                ctx.fillStyle = "#b446ff";
                ctx.fillRect(xCursor, dibujoY - 16, 2, tamanioFuente);
            }
        }

        // --- PANEL SUPERIOR / BOTONERA TÁCTIL ---
        ctx.fillStyle = "#2d2d2d";
        ctx.fillRect(0, 0, canvas.width, 100);

        // Botones de acción (Ancho dinámico basado en pantalla)
        const btnW = (canvas.width - 60) / 5;
        const nombresBotones = ["Nuevo", "Abrir", "Guardar", "Buscar L.", "Ejecutar"];
        
        ctx.font = "12px sans-serif";
        for (let i = 0; i < 5; i++) {
            let btnX = 10 + i * (btnW + 10);
            ctx.fillStyle = i === 4 ? "#0e639c" : "#3c3c3c"; // El botón Ejecutar va en azul
            ctx.fillRect(btnX, 10, btnW, 40);
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.fillText(nombresBotones[i], btnX + btnW/2, 33);
        }
        ctx.textAlign = "left"; // Resetear alineación

        // Zona interactiva del Nombre del Archivo (¡Permite cambiar el nombre!)
        ctx.fillStyle = "#1e1e1e";
        ctx.fillRect(10, 60, canvas.width - 20, 30);
        ctx.strokeStyle = "#007acc";
        ctx.strokeRect(10, 60, canvas.width - 20, 30);
        
        ctx.fillStyle = "#858585";
        ctx.font = "12px sans-serif";
        ctx.fillText("Archivo activo (Toca para renombrar):", 20, 78);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(archivoAbiertoActual, 240, 79);

        // --- BARRA DE ESTADO INFERIOR ---
        ctx.fillStyle = "#007acc";
        ctx.fillRect(0, canvas.height - 35, canvas.width, 35);
        ctx.fillStyle = "#ffffff";
        ctx.font = "13px sans-serif";
        ctx.fillText(`Línea: ${lineaActual + 1} | Columna: ${columnaActual} | Líneas totales: ${lineasCodigo.length}`, 20, canvas.height - 13);

        // --- MODALES (Buscador y Renombrar) ---
        if (modoBuscadorLinea) {
            dibujarModal("Ir a la línea:", inputLineaBuscada);
        } else if (modoRenombrar) {
            dibujarModal("Nuevo nombre de archivo:", nuevoNombreTemp);
        }

        requestAnimationFrame(UpdateAndDraw);
    }

    function dibujarModal(titulo, valor) {
        ctx.fillStyle = "rgba(0,0,0,0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "20px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(titulo, canvas.width/2, canvas.height/2 - 40);
        ctx.font = "bold 24px monospace";
        ctx.fillStyle = "#b446ff";
        ctx.fillText(valor + "_", canvas.width/2, canvas.height/2 + 10);
        ctx.font = "12px sans-serif";
        ctx.fillStyle = "#888";
        ctx.fillText("Escribí y tocá Enter en el teclado para confirmar", canvas.width/2, canvas.height/2 + 60);
        ctx.textAlign = "left";
    }

    // --- LÓGICA DE CONTROL TÁCTIL (MÓVIL) ---
    window.addEventListener('touchend', (e) => {
        const touchX = e.changedTouches[0].clientX;
        const touchY = e.changedTouches[0].clientY;

        // Ancho de los botones
        const btnW = (canvas.width - 60) / 5;

        // ¿Tocó la botonera superior (Y entre 10 y 50)?
        if (touchY >= 10 && touchY <= 50) {
            for (let i = 0; i < 5; i++) {
                let btnX = 10 + i * (btnW + 10);
                if (touchX >= btnX && touchX <= btnX + btnW) {
                    ejecutarBoton(i);
                    return;
                }
            }
        }

        // ¿Tocó la zona para renombrar archivo (Y entre 60 y 90)?
        if (touchY >= 60 && touchY <= 90 && touchX >= 10 && touchX <= canvas.width - 10) {
            modoRenombrar = true;
            nuevoNombreTemp = archivoAbiertoActual;
            tecladoOculto.value = nuevoNombreTemp;
            setTimeout(() => tecladoOculto.focus(), 50);
            return;
        }

        // Si tocó el cuerpo de código, enfoca el editor normal
        if (touchY > 100 && touchY < canvas.height - 35) {
            modoBuscadorLinea = false;
            modoRenombrar = false;
            tecladoOculto.value = lineasCodigo[lineaActual];
            tecladoOculto.selectionStart = columnaActual;
            tecladoOculto.selectionEnd = columnaActual;
            setTimeout(() => tecladoOculto.focus(), 50);
        }
    });

    // --- MANEJO DE LAS FUNCIONES DEL IDE ---
    function ejecutarBoton(id) {
        if (id === 0) { // NUEVO
            if (confirm("¿Seguro que querés crear un nuevo archivo? Se borrará el código actual.")) {
                lineasCodigo = [""];
                lineaActual = 0;
                columnaActual = 0;
                archivoAbiertoActual = "Sin_Nombre.cpp";
            }
        } 
        else if (id === 1) { // ABRIR (Simulado leyendo archivos locales del celu)
            fileInput.click();
        } 
        else if (id === 2) { // GUARDAR (Descarga el archivo al celular)
            const contenido = lineasCodigo.join("\n");
            const blob = new Blob([contenido], { type: "text/plain" });
            const enlace = document.createElement("a");
            enlace.href = URL.createObjectURL(blob);
            enlace.download = archivoAbiertoActual;
            enlace.click();
        } 
        else if (id === 3) { // BUSCAR LÍNEA
            modoBuscadorLinea = true;
            inputLineaBuscada = "";
            tecladoOculto.value = "";
            setTimeout(() => tecladoOculto.focus(), 50);
        } 
        else if (id === 4) { // EJECUTAR (Simulador de consola básica)
            alert("Compilando en el dispositivo...\n\nSalida del Programa:\n-----------------------\n¡Hola Android!\n\n-----------------------\nProceso terminado con código 0.");
        }
    }

    // Lector de archivos para la función "Abrir"
    fileInput.addEventListener('change', (e) => {
        const archivo = e.target.files[0];
        if (!archivo) return;

        archivoAbiertoActual = archivo.name;
        const lector = new FileReader();
        lector.onload = function(evento) {
            const contenido = evento.target.result;
            lineasCodigo = contenido.split(/\r?\n/);
            if (lineasCodigo.length === 0) lineasCodigo = [""];
            lineaActual = 0;
            columnaActual = 0;
        };
        lector.readAsText(archivo);
    });

    // --- CAPTURA DE TEXTO Y ESCRITURA ---
    tecladoOculto.addEventListener('input', (e) => {
        let textoEntrada = tecladoOculto.value;

        if (modoBuscadorLinea) {
            inputLineaBuscada = textoEntrada.replace(/\D/g, ''); // Solo números
            tecladoOculto.value = inputLineaBuscada;
        } else if (modoRenombrar) {
            nuevoNombreTemp = textoEntrada.replace(/[^a-zA-Z0-9_.]/g, ''); // Sin símbolos raros
            tecladoOculto.value = nuevoNombreTemp;
        } else {
            lineasCodigo[lineaActual] = textoEntrada;
            columnaActual = tecladoOculto.selectionStart;
        }
    });

    tecladoOculto.addEventListener('keydown', (e) => {
        let linea = lineasCodigo[lineaActual];

        if (e.key === 'Enter') {
            e.preventDefault();
            
            if (modoBuscadorLinea) {
                let destino = parseInt(inputLineaBuscada) - 1;
                if (!isNaN(destino)) {
                    lineaActual = Math.max(0, Math.min(destino, lineasCodigo.length - 1));
                    columnaActual = 0;
                }
                modoBuscadorLinea = false;
                tecladoOculto.blur();
            } else if (modoRenombrar) {
                if (nuevoNombreTemp.trim() !== "") {
                    archivoAbiertoActual = nuevoNombreTemp;
                }
                modoRenombrar = false;
                tecladoOculto.blur();
            } else {
                let resto = linea.slice(columnaActual);
                lineasCodigo[lineaActual] = linea.slice(0, columnaActual);
                lineasCodigo.splice(lineaActual + 1, 0, resto);
                lineaActual++;
                columnaActual = 0;
                tecladoOculto.value = resto;
                tecladoOculto.selectionStart = 0;
                tecladoOculto.selectionEnd = 0;
            }
        }
        
        if (e.key === 'Backspace' && columnaActual === 0 && lineaActual > 0 && !modoBuscadorLinea && !modoRenombrar) {
            e.preventDefault();
            let lineaAnterior = lineasCodigo[lineaActual - 1];
            columnaActual = lineaAnterior.length;
            lineasCodigo[lineaActual - 1] += linea;
            lineasCodigo.splice(lineaActual, 1);
            lineaActual--;
            
            tecladoOculto.value = lineasCodigo[lineaActual];
            tecladoOculto.selectionStart = columnaActual;
            tecladoOculto.selectionEnd = columnaActual;
        }
    });

    window.onload = function() {
        requestAnimationFrame(UpdateAndDraw);
    };
</script>

</body>
</html>
