<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>raylibcompiler - IDE v1.0 (Mobile Port)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Input invisible para importar archivos (.cpp o .txt) -->
<input type="file" id="fileInput" accept=".cpp,.txt" style="display: none;">

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Variables de estado
    let lineasCodigo = ["#include <iostream>", "int main() {", "    std::cout << \"¡Hola Android!\" << std::endl;", "    return 0;", "}"];
    let lineaActual = 0;
    let columnaActual = 0;
    let scrollY = 0;
    const altoLinea = 25;
    const tamanioFuente = 18;

    let temporizadorCursor = 0;
    let mostrarCursor = true;

    let archivoAbiertoActual = "Sin_Nombre.cpp";
    let modoBuscadorLinea = false;
    let inputLineaBuscada = "";
    
    let modoRenombrar = false;
    let nuevoNombreTemp = "";

    // --- VARIABLES DE DINÁMICA DE TECLADO MÓVIL ---
    let tecladoAbierto = false;
    let alturaTecladoDetectada = 0;
    let altoBarraHerramientas = 50;

    // --- TEXTAREA OCULTO ---
    const tecladoOculto = document.createElement('textarea');
    tecladoOculto.style.position = 'absolute';
    tecladoOculto.style.left = '0px';
    tecladoOculto.style.top = '0px';
    tecladoOculto.style.width = '1px';
    tecladoOculto.style.height = '1px';
    tecladoOculto.style.opacity = '0.01';
    tecladoOculto.style.border = 'none';
    tecladoOculto.style.outline = 'none';
    tecladoOculto.value = "";
    document.body.appendChild(tecladoOculto);

    // Escuchar el tamaño real de pantalla visible (Visual Viewport)
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            // Si la altura del viewport visual se reduce, el teclado está abierto
            const alturaTeclado = window.innerHeight - window.visualViewport.height;
            if (alturaTeclado > 80) {
                tecladoAbierto = true;
                alturaTecladoDetectada = alturaTeclado;
            } else {
                tecladoAbierto = false;
                alturaTecladoDetectada = 0;
            }
        });
    }

    tecladoOculto.addEventListener('focus', () => window.scrollTo(0, 0));

    // Bucle de renderizado
    function UpdateAndDraw() {
        temporizadorCursor += 1/60;
        if (temporizadorCursor >= 0.5) {
            mostrarCursor = !mostrarCursor;
            temporizadorCursor = 0;
        }

        // Fondo del IDE
        ctx.fillStyle = "#1e1e1e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar líneas de código
        ctx.font = `${tamanioFuente}px monospace`;
        
        // El límite de dibujo inferior se adapta dinámicamente si el teclado tapa la pantalla
        const limiteInferiorCodigo = canvas.height - (tecladoAbierto ? (alturaTecladoDetectada + altoBarraHerramientas + 20) : 100);

        for (let l = 0; l < lineasCodigo.length; l++) {
            let dibujoY = 120 + (l * altoLinea) - scrollY;

            if (dibujoY < 110 || dibujoY > limiteInferiorCodigo) continue;

            // Números de línea
            ctx.fillStyle = "#858585";
            ctx.fillText((l + 1).toString(), 20, dibujoY);

            // Separador
            ctx.fillStyle = "#3c3c3c";
            ctx.fillRect(55, dibujoY - 16, 2, altoLinea);

            if (l === lineaActual) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
                ctx.fillRect(65, dibujoY - 16, canvas.width - 80, altoLinea);
            }

            let linea = lineasCodigo[l];
            let acumuladoX = 70;
            let palabras = linea.split(/(\s+)/);

            palabras.forEach(palabra => {
                if (palabra.trim().startsWith("#include") || palabra.trim().startsWith("#")) {
                    ctx.fillStyle = "#9632fa";
                } else if (["int", "while", "if", "return", "void", "using", "namespace", "std", "cout", "endl"].includes(palabra.trim())) {
                    ctx.fillStyle = "#3296fa";
                } else {
                    ctx.fillStyle = "#ffffff";
                }
                ctx.fillText(palabra, acumuladoX, dibujoY);
                acumuladoX += ctx.measureText(palabra).width;
            });

            // Dibujar cursor
            if (l === lineaActual && mostrarCursor && !modoBuscadorLinea && !modoRenombrar) {
                let textoHastaCursor = linea.substring(0, columnaActual);
                let xCursor = 70 + ctx.measureText(textoHastaCursor).width;
                ctx.fillStyle = "#b446ff";
                ctx.fillRect(xCursor, dibujoY - 16, 2, tamanioFuente);
            }
        }

        // --- PANEL SUPERIOR / BOTONERA ---
        ctx.fillStyle = "#2d2d2d";
        ctx.fillRect(0, 0, canvas.width, 100);

        const btnW = (canvas.width - 60) / 5;
        const nombresBotones = ["Nuevo", "Abrir", "Guardar", "Buscar L.", "Ejecutar"];
        
        ctx.font = "12px sans-serif";
        for (let i = 0; i < 5; i++) {
            let btnX = 10 + i * (btnW + 10);
            ctx.fillStyle = i === 4 ? "#0e639c" : "#3c3c3c";
            ctx.fillRect(btnX, 10, btnW, 40);
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.fillText(nombresBotones[i], btnX + btnW/2, 33);
        }
        ctx.textAlign = "left";

        // Nombre de archivo activo
        ctx.fillStyle = "#1e1e1e";
        ctx.fillRect(10, 60, canvas.width - 20, 30);
        ctx.strokeStyle = "#007acc";
        ctx.strokeRect(10, 60, canvas.width - 20, 30);
        
        ctx.fillStyle = "#858585";
        ctx.font = "12px sans-serif";
        ctx.fillText("Archivo activo (Toca para renombrar):", 20, 78);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(archivoAbiertoActual, 240, 79);

        // --- BARRA DE ACCESOS RÁPIDOS MÓVIL (Con posicionamiento dinámico sobre el teclado) ---
        // Si el teclado está abierto, la barra se dibuja justo encima de él. Si no, va al final de la pantalla.
        const barraY = canvas.height - altoBarraHerramientas - alturaTecladoDetectada - (tecladoAbierto ? 35 : 35);
        
        ctx.fillStyle = "#252526";
        ctx.fillRect(0, barraY, canvas.width, altoBarraHerramientas);
        
        const teclasRapidas = ["{", "}", "(", ")", '"', ";", "<", ">", "⬅", "➡", "⬆", "⬇"];
        const anchoTecla = canvas.width / teclasRapidas.length;
        
        ctx.font = "bold 15px sans-serif";
        ctx.textAlign = "center";
        for (let t = 0; t < teclasRapidas.length; t++) {
            ctx.strokeStyle = "#3e3e3e";
            ctx.strokeRect(t * anchoTecla, barraY, anchoTecla, altoBarraHerramientas);
            
            ctx.fillStyle = t >= 8 ? "#3e3e42" : "#2d2d30"; 
            ctx.fillRect(t * anchoTecla + 1, barraY + 1, anchoTecla - 2, altoBarraHerramientas - 2);
            
            ctx.fillStyle = "#ffffff";
            ctx.fillText(teclasRapidas[t], t * anchoTecla + anchoTecla/2, barraY + 30);
        }
        ctx.textAlign = "left";

        // --- BARRA DE ESTADO INFERIOR ---
        // Se esconde dinámicamente si el teclado está abierto para no estorbar
        if (!tecladoAbierto) {
            ctx.fillStyle = "#007acc";
            ctx.fillRect(0, canvas.height - 35, canvas.width, 35);
            ctx.fillStyle = "#ffffff";
            ctx.font = "12px sans-serif";
            ctx.fillText(`Línea: ${lineaActual + 1} | Columna: ${columnaActual} | Total Líneas: ${lineasCodigo.length}`, 20, canvas.height - 12);
        }

        // Modales
        if (modoBuscadorLinea) {
            dibujarModal("Ir a la línea:", inputLineaBuscada);
        } else if (modoRenombrar) {
            dibujarModal("Nuevo nombre de archivo:", nuevoNombreTemp);
        }

        requestAnimationFrame(UpdateAndDraw);
    }

    function dibujarModal(titulo, valor) {
        ctx.fillStyle = "rgba(0,0,0,0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "20px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(titulo, canvas.width/2, canvas.height/2 - 40);
        ctx.font = "bold 24px monospace";
        ctx.fillStyle = "#b446ff";
        ctx.fillText(valor + "_", canvas.width/2, canvas.height/2 + 10);
        ctx.font = "12px sans-serif";
        ctx.fillStyle = "#888";
        ctx.fillText("Escribí y tocá Enter en el teclado para confirmar", canvas.width/2, canvas.height/2 + 60);
        ctx.textAlign = "left";
    }

    // --- LÓGICA TÁCTIL (MÓVIL) ---
    window.addEventListener('touchend', (e) => {
        const touchX = e.changedTouches[0].clientX;
        const touchY = e.changedTouches[0].clientY;

        // 1. Botonera superior
        const btnW = (canvas.width - 60) / 5;
        if (touchY >= 10 && touchY <= 50) {
            for (let i = 0; i < 5; i++) {
                let btnX = 10 + i * (btnW + 10);
                if (touchX >= btnX && touchX <= btnX + btnW) {
                    ejecutarBoton(i);
                    return;
                }
            }
        }

        // 2. Renombrar archivo
        if (touchY >= 60 && touchY <= 90 && touchX >= 10 && touchX <= canvas.width - 10) {
            modoRenombrar = true;
            nuevoNombreTemp = archivoAbiertoActual;
            tecladoOculto.value = nuevoNombreTemp;
            setTimeout(() => tecladoOculto.focus(), 50);
            return;
        }

        // 3. Barra de accesos rápidos adaptada dinámicamente según la posición del teclado
        const barraY = canvas.height - altoBarraHerramientas - alturaTecladoDetectada - (tecladoAbierto ? 35 : 35);
        if (touchY >= barraY && touchY <= barraY + altoBarraHerramientas) {
            const teclasRapidas = ["{", "}", "(", ")", '"', ";", "<", ">", "⬅", "➡", "⬆", "⬇"];
            const anchoTecla = canvas.width / teclasRapidas.length;
            const indiceTecla = Math.floor(touchX / anchoTecla);
            
            if (indiceTecla >= 0 && indiceTecla < teclasRapidas.length) {
                presionarTeclaEspecial(teclasRapidas[indiceTecla]);
            }
            return;
        }

        // 4. Posicionar el cursor en la letra exacta tocada en el código
        const limiteInferiorCodigo = canvas.height - (tecladoAbierto ? (alturaTecladoDetectada + altoBarraHerramientas + 20) : 100);
        if (touchY > 100 && touchY < limiteInferiorCodigo) {
            modoBuscadorLinea = false;
            modoRenombrar = false;

            let lineaTocada = Math.floor((touchY - 120 + scrollY + (altoLinea / 2)) / altoLinea);
            lineaTocada = Math.max(0, Math.min(lineaTocada, lineasCodigo.length - 1));
            lineaActual = lineaTocada;

            let linea = lineasCodigo[lineaActual];
            ctx.font = `${tamanioFuente}px monospace`;
            
            let mejorColumna = 0;
            let menorDistancia = Infinity;

            for (let col = 0; col <= linea.length; col++) {
                let anchoTexto = ctx.measureText(linea.substring(0, col)).width;
                let posXLetra = 70 + anchoTexto;
                let distancia = Math.abs(touchX - posXLetra);

                if (distancia < menorDistancia) {
                    menorDistancia = distancia;
                    mejorColumna = col;
                }
            }
            columnaActual = mejorColumna;

            tecladoOculto.value = linea;
            tecladoOculto.selectionStart = columnaActual;
            tecladoOculto.selectionEnd = columnaActual;
            setTimeout(() => tecladoOculto.focus(), 50);
        }
    });

    // --- ACCIONES DE ACCESOS RÁPIDOS Y FLECHAS ---
    function presionarTeclaEspecial(simbolo) {
        let linea = lineasCodigo[lineaActual];

        if (simbolo === "⬅") {
            if (columnaActual > 0) columnaActual--;
        } else if (simbolo === "➡") {
            if (columnaActual < linea.length) columnaActual++;
        } else if (simbolo === "⬆") {
            if (lineaActual > 0) {
                lineaActual--;
                columnaActual = Math.min(columnaActual, lineasCodigo[lineaActual].length);
            }
        } else if (simbolo === "⬇") {
            if (lineaActual < lineasCodigo.length - 1) {
                lineaActual++;
                columnaActual = Math.min(columnaActual, lineasCodigo[lineaActual].length);
            }
        } else {
            lineasCodigo[lineaActual] = linea.slice(0, columnaActual) + simbolo + linea.slice(columnaActual);
            columnaActual += simbolo.length;
        }

        tecladoOculto.value = lineasCodigo[lineaActual];
        tecladoOculto.selectionStart = columnaActual;
        tecladoOculto.selectionEnd = columnaActual;
    }

    // --- PANEL DE ACCIONES ---
    function ejecutarBoton(id) {
        if (id === 0) {
            if (confirm("¿Seguro que querés crear un nuevo archivo? Se borrará el código actual.")) {
                lineasCodigo = [""];
                lineaActual = 0;
                columnaActual = 0;
                archivoAbiertoActual = "Sin_Nombre.cpp";
            }
        } 
        else if (id === 1) {
            fileInput.click();
        } 
        else if (id === 2) {
            const contenido = lineasCodigo.join("\n");
            const blob = new Blob([contenido], { type: "text/plain" });
            const enlace = document.createElement("a");
            enlace.href = URL.createObjectURL(blob);
            enlace.download = archivoAbiertoActual;
            enlace.click();
        } 
        else if (id === 3) {
            modoBuscadorLinea = true;
            inputLineaBuscada = "";
            tecladoOculto.value = "";
            setTimeout(() => tecladoOculto.focus(), 50);
        } 
        else if (id === 4) {
            alert("Compilando en el dispositivo...\n\nSalida del Programa:\n-----------------------\n¡Hola Android!\n\n-----------------------\nProceso terminado con código 0.");
        }
    }

    fileInput.addEventListener('change', (e) => {
        const archivo = e.target.files[0];
        if (!archivo) return;

        archivoAbiertoActual = archivo.name;
        const lector = new FileReader();
        lector.onload = function(evento) {
            const contenido = evento.target.result;
            lineasCodigo = contenido.split(/\r?\n/);
            if (lineasCodigo.length === 0) lineasCodigo = [""];
            lineaActual = 0;
            columnaActual = 0;
        };
        lector.readAsText(archivo);
    });

    // --- CAPTURA DE ESCRITURA ---
    tecladoOculto.addEventListener('input', (e) => {
        let textoEntrada = tecladoOculto.value;

        if (modoBuscadorLinea) {
            inputLineaBuscada = textoEntrada.replace(/\D/g, '');
            tecladoOculto.value = inputLineaBuscada;
        } else if (modoRenombrar) {
            nuevoNombreTemp = textoEntrada.replace(/[^a-zA-Z0-9_.]/g, '');
            tecladoOculto.value = nuevoNombreTemp;
        } else {
            lineasCodigo[lineaActual] = textoEntrada;
            columnaActual = tecladoOculto.selectionStart;
        }
    });

    tecladoOculto.addEventListener('keydown', (e) => {
        let linea = lineasCodigo[lineaActual];

        if (e.key === 'Enter') {
            e.preventDefault();
            
            if (modoBuscadorLinea) {
                let destino = parseInt(inputLineaBuscada) - 1;
                if (!isNaN(destino)) {
                    lineaActual = Math.max(0, Math.min(destino, lineasCodigo.length - 1));
                    columnaActual = 0;
                }
                modoBuscadorLinea = false;
                tecladoOculto.blur();
            } else if (modoRenombrar) {
                if (nuevoNombreTemp.trim() !== "") {
                    archivoAbiertoActual = nuevoNombreTemp;
                }
                modoRenombrar = false;
                tecladoOculto.blur();
            } else {
                let resto = linea.slice(columnaActual);
                lineasCodigo[lineaActual] = linea.slice(0, columnaActual);
                lineasCodigo.splice(lineaActual + 1, 0, resto);
                lineaActual++;
                columnaActual = 0;
                tecladoOculto.value = resto;
                tecladoOculto.selectionStart = 0;
                tecladoOculto.selectionEnd = 0;
            }
        }
        
        if (e.key === 'Backspace' && columnaActual === 0 && lineaActual > 0 && !modoBuscadorLinea && !modoRenombrar) {
            e.preventDefault();
            let lineaAnterior = lineasCodigo[lineaActual - 1];
            columnaActual = lineaAnterior.length;
            lineasCodigo[lineaActual - 1] += linea;
            lineasCodigo.splice(lineaActual, 1);
            lineaActual--;
            
            tecladoOculto.value = lineasCodigo[lineaActual];
            tecladoOculto.selectionStart = columnaActual;
            tecladoOculto.selectionEnd = columnaActual;
        }
    });

    window.onload = function() {
        requestAnimationFrame(UpdateAndDraw);
    };
</script>

</body>
</html>
